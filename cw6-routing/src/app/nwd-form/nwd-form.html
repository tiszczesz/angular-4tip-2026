<section class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h4 mb-4">NWD formularz</h2>

                    <form class="row g-3" novalidate (submit)="handleSubmit($event)">
                        <div class="col-12 col-md-6">
                            <label for="a" class="form-label">Liczba a</label>
                            <input type="number" id="a" class="form-control" [formField]="nwdForm.a" />
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="b" class="form-label">Liczba b</label>
                            <input type="number" id="b" class="form-control" [formField]="nwdForm.b" />
                        </div>

                        <div class="col-12">
                            <label for="method" class="form-label">Metoda obliczania</label>
                            <select id="method" class="form-select" aria-label="Wybierz metodę obliczania NWD">
                                <option value="rek">Metoda rekurencyjna</option>
                                <option value="iter">Metoda iteracyjna</option>
                            </select>
                        </div>

                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Oblicz NWD</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
<hr>
<section class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h4 mb-4">Wynik</h2>
                    <p class="lead">{{ result() }}</p>
                </div>
            </div>
        </div>
    </div>
</section>
