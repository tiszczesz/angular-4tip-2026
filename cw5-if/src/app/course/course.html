<div>
    <h6 class="info">{{course().title}}</h6>
    <p>{{course().description}}</p>
    <p>Poziom: {{course().level}}</p>
    <p>Obecna liczba uczestników: {{course().count}} / {{course().limit}}</p>
    <button [disabled]="course().count >= course().limit" 
        (click)="enroll()" class="btn btn-primary">Zapisz się

    </button>
</div>
